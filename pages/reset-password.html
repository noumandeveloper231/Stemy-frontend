<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — Stemy</title>
</head>
<body style="margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0f;color:#e5e7eb;font-family:system-ui,sans-serif;">
  <p id="msg">Redirecting…</p>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var t = p.get('token');
      var e = p.get('email');
      if (t && e) {
        sessionStorage.setItem('stemy_reset_token', t);
        sessionStorage.setItem('stemy_reset_email', decodeURIComponent(e));
      } else {
        document.getElementById('msg').textContent = 'Invalid reset link. Request a new reset from the login page.';
        return;
      }
      location.replace('subscription.html');
    })();
  </script>
</body>
</html>
